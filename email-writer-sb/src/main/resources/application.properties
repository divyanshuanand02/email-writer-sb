spring.application.name=email-writer-sb
gemini.api.url = ${GEMINI_URL}
gemini.api.key = ${GEMINI_KEY}
server.port = 8081

# Redis (response cache). App degrades gracefully if Redis is unreachable.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Gemini cost estimation (USD per 1,000,000 tokens — verify against current pricing)
gemini.cost.input-per-1m=0.10
gemini.cost.output-per-1m=0.40

# Rate limiting (per client IP)
ratelimit.capacity=10
ratelimit.refill-tokens=10
ratelimit.refill-duration-minutes=1
