# Test-only overrides so the Spring context loads without real Gemini env vars.
gemini.api.url=http://localhost/test-gemini?key=
gemini.api.key=test-key
gemini.cost.input-per-1m=0.10
gemini.cost.output-per-1m=0.40

# Rate limiting (required for the context to load in tests)
ratelimit.capacity=10
ratelimit.refill-tokens=10
ratelimit.refill-duration-minutes=1
